<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#1a1a1a"/>
  <!-- グリッド背景 -->
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.05"/>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.5"/>
    </pattern>
  </defs>
  <!-- アクセントライン -->
  <rect x="0" y="0" width="8" height="630" fill="#d97706"/>
  <!-- メインテキスト -->
  <text x="100" y="240" font-family="'Helvetica Neue', Arial, sans-serif" font-size="88" font-weight="900" fill="#ffffff" letter-spacing="-2">Gear</text>
  <text x="100" y="340" font-family="'Helvetica Neue', Arial, sans-serif" font-size="88" font-weight="900" fill="#d97706" letter-spacing="-2">ちゃんねる</text>
  <!-- サブテキスト -->
  <text x="100" y="420" font-family="'Helvetica Neue', Arial, sans-serif" font-size="30" fill="#888888">アーティストの使用機材のデータベースを皆で作ろう</text>
  <!-- 装飾ドット -->
  <circle cx="1050" cy="180" r="120" fill="#d97706" opacity="0.15"/>
  <circle cx="1100" cy="450" r="80" fill="#d97706" opacity="0.1"/>
  <!-- ギターアイコン的な装飾 -->
  <text x="950" y="250" font-size="140" opacity="0.2">🎸</text>
</svg>
